name: Build Windows Portable .exe (Icon + Tesseract)

on:
  push:
    branches: [ main ]
    paths:
      - 'cheque_scanner_v10.28.py'
      - 'requirements.txt'
      - '.github/workflows/build-portable-exe.yml'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # === Bundle portable Ollama ===
      - name: Download & bundle Ollama.exe
        run: |
          mkdir -p ollama
          curl -L -o ollama/ollama.exe https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.exe

      # === FIXED: Reliable Tesseract download + extraction (PowerShell) ===
      - name: Download & bundle Tesseract (OCR fallback)
        run: |
          mkdir -p tesseract
          Invoke-WebRequest -Uri "https://github.com/UB-Mannheim/tesseract/releases/download/5.4.0/tesseract-5.4.0-win64.zip" `
            -OutFile "tesseract.zip" -UseBasicParsing
          Expand-Archive -Path "tesseract.zip" -DestinationPath "tesseract" -Force
          Remove-Item "tesseract.zip" -Force
          echo "Tesseract + tessdata (eng/ara) successfully bundled"

      - name: Build portable .exe with PyInstaller (Custom Icon + Tesseract)
        run: |
          pyinstaller --onefile --windowed --name "Cheque Scanner v10.28" `
            --icon=app_icon.ico `                          # ← YOUR CUSTOM ICON
            --add-binary "ollama/ollama.exe;ollama" `
            --add-binary "tesseract/tesseract.exe;tesseract" `
            --add-data "tesseract/tessdata;tesseract/tessdata" `
            --add-data "requirements.txt;." `
            --collect-all PyQt6 `
            --collect-all fitz `
            --hidden-import=PyQt6.QtCore `
            --hidden-import=PyQt6.QtGui `
            --hidden-import=PyQt6.QtWidgets `
            --hidden-import=PyQt6.sip `
            cheque_scanner_v10.28.py

      - name: Prepare final portable distribution folder
        run: |
          mkdir -p "dist/Cheque-Scanner-Portable"
          copy "dist\Cheque Scanner v10.28.exe" "dist\Cheque-Scanner-Portable\"
          mkdir "dist\Cheque-Scanner-Portable\ollama"
          copy "ollama\ollama.exe" "dist\Cheque-Scanner-Portable\ollama\"
          xcopy /E /I /Y tesseract "dist\Cheque-Scanner-Portable\tesseract"
          mkdir "dist\Cheque-Scanner-Portable\models"

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: Cheque-Scanner-v10.28-Portable-Windows
          path: dist/Cheque-Scanner-Portable/
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Cheque-Scanner-Portable/Cheque Scanner v10.28.exe
            dist/Cheque-Scanner-Portable/ollama/ollama.exe
            dist/Cheque-Scanner-Portable/tesseract/tesseract.exe
          tag_name: ${{ github.ref_name }}
          name: Cheque Scanner v10.28 Portable Windows (Icon + Tesseract)
          body: |
            **Fully portable .exe** — custom icon + Tesseract OCR fully bundled.
            Ready for Al Taameer real-estate cheque batch processing.
