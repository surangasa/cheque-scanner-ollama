name: Build Windows Portable .exe

on:
  push:
    branches: [ main ]
    paths:
      - 'cheque_scanner_v10.28.py'
      - 'requirements.txt'
      - '.github/workflows/build-portable-exe.yml'
  release:
    types: [created]
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # === CRITICAL: Bundle portable Ollama binary ===
      - name: Download & bundle Ollama.exe (portable)
        run: |
          mkdir -p ollama
          curl -L -o ollama/ollama.exe https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.exe
          echo "Ollama binary ready for bundling"

      # Optional: Tesseract for OCR fallback (uncomment if you want it bundled)
      # - name: Download & bundle Tesseract
      #   run: |
      #     mkdir -p tesseract
      #     curl -L -o tesseract.zip https://github.com/UB-Mannheim/tesseract/releases/download/5.4.0/tesseract-5.4.0-win64.zip
      #     tar -xf tesseract.zip -C tesseract --strip-components=1
      #     echo "Tesseract ready"

      - name: Build portable .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "Cheque Scanner v10.28" `
            --icon=app_icon.ico `                     # ← optional (add your .ico to repo root)
            --add-binary "ollama/ollama.exe;ollama" `
            --add-data "requirements.txt;." `
            --collect-all PyQt6 `
            --collect-all fitz `
            --hidden-import=PyQt6.QtCore `
            --hidden-import=PyQt6.QtGui `
            --hidden-import=PyQt6.QtWidgets `
            --hidden-import=PyQt6.sip `
            cheque_scanner_v10.28.py

      - name: Prepare portable distribution folder
        run: |
          mkdir -p "dist/Cheque-Scanner-Portable"
          copy "dist\Cheque Scanner v10.28.exe" "dist\Cheque-Scanner-Portable\"
          mkdir "dist\Cheque-Scanner-Portable\ollama"
          copy "ollama\ollama.exe" "dist\Cheque-Scanner-Portable\ollama\"
          mkdir "dist\Cheque-Scanner-Portable\models"   # empty – user pulls model on first run

      - name: Upload portable .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cheque-Scanner-v10.28-Portable-Windows
          path: dist/Cheque-Scanner-Portable/
          retention-days: 30

      - name: Release asset (on GitHub Release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Cheque-Scanner-Portable/Cheque Scanner v10.28.exe
            dist/Cheque-Scanner-Portable/ollama/ollama.exe
          tag_name: ${{ github.ref_name }}
          name: Cheque Scanner v10.28 Portable Windows
          body: |
            **Portable .exe for real-estate cheque batch scanning**
            - One .exe + ollama/models folders
            - First-run model download handled inside the app
            - Perfect for Al Taameer / Lusail property teams
